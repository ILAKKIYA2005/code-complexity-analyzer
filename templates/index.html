<!DOCTYPE html>
<html>

<head>

<title>Code Complexity Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#3b82f6;
}

h3{
color:#60a5fa;
}

#editor{
width:80%;
height:300px;
margin:auto;
border-radius:10px;
border:1px solid #334155;
}

select{
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

input[type="file"]{
color:white;
}

button{
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

canvas{
background:white;
border-radius:10px;
margin-top:30px;
}

.result-box{
margin-top:30px;
padding:20px;
background:#1e293b;
border-radius:10px;
width:60%;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>🚀 Code Complexity Analyzer</h1>

<form method="POST" enctype="multipart/form-data" onsubmit="submitCode()">

<select name="language">

<option value="python">Python</option>
<option value="java">Java</option>
<option value="cpp">C++</option>

</select>

<br><br>

<h3>Upload Code File</h3>

<input type="file" name="file">

<br><br>

<h3>OR Write Code</h3>

<div id="editor"></div>

<input type="hidden" name="code" id="codeInput">

<br><br>

<button type="submit">Analyze Code</button>

</form>

{% if result %}

<div class="result-box">

<h2>Time Complexity : {{result.complexity}}</h2>

<p>Loops Found : {{result.loops}}</p>

<p>Conditions Found : {{result.conditions}}</p>

<h3>Explanation</h3>

<p>{{result.explanation}}</p>

</div>

<canvas id="complexityChart" width="600" height="300"></canvas>

<script>

var xValues = {{result.x | tojson}};
var yValues = {{result.y | tojson}};

new Chart(document.getElementById("complexityChart"), {

type: "line",

data: {
labels: xValues,
datasets: [{
label: "Time Complexity Growth",
data: yValues,
borderColor: "blue",
borderWidth: 3,
fill:false
}]
},

options:{
responsive:true
}

});

</script>

{% endif %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>

<script>

var editor;

require.config({
paths: {
'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
}
});

require(['vs/editor/editor.main'], function () {

editor = monaco.editor.create(document.getElementById('editor'), {

value: `# Example Code
for i in range(10):
    for j in range(10):
        print(i,j)
`,

language: 'python',

theme: 'vs-dark'

});

});

function submitCode(){

document.getElementById("codeInput").value = editor.getValue();

}

</script>

</body>
</html>
